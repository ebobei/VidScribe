project_name: "tapo_c225_audio_research"

query: "TP-Link Tapo C225 review"

limit: 20
candidate_pool_size: 60

duration:
  mode: "medium"
  min_seconds: 240
  max_seconds: 3600

languages:
  preferred:
    - "ru"
    - "en"
  allow_auto_subtitles: true
  allow_manual_subtitles: true

youtube:
  order: "relevance"
  region_code: "RU"
  relevance_language: "ru"
  exclude_shorts: true
  exclude_live: true

output:
  directory: "./output/tapo_c225_audio"
  build_zip: true
  build_summary_md: true
  build_chunks_jsonl: true

safety:
  download_video: false
  download_audio: false
  public_dataset: false
